<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON DEFENSE</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230a0a0a'/%3E%3Cpolygon points='16,4 28,28 4,28' fill='none' stroke='%2300ffff' stroke-width='2'/%3E%3Ccircle cx='16' cy='18' r='4' fill='%2300ffff' opacity='0.8'/%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  user-select: none;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

#game-container {
  display: flex;
  width: 100vw;
  height: 100vh;
}

#canvas-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

canvas {
  display: block;
  cursor: crosshair;
  max-width: 100%;
  max-height: 100%;
  touch-action: none;
}

/* HUD Overlay */
#ui-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0.2), transparent);
  pointer-events: none;
  font-size: 16px;
  font-weight: bold;
  z-index: 10;
}

.hud-item {
  display: flex;
  align-items: center;
  gap: 6px;
  text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
  letter-spacing: 1px;
}

#hud-gold { color: #ffd700; }
#hud-wave { color: #00ffff; }
#hud-lives { color: #ff4444; }
#hud-score { color: #ffffff; }

/* Unlock Tracker */
#unlock-tracker {
  position: absolute;
  top: 34px;
  left: 16px;
  z-index: 10;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  pointer-events: none;
}

#unlock-tracker .unlock-label {
  color: #666;
  margin-bottom: 3px;
}

#unlock-tracker .unlock-bar-bg {
  width: 120px;
  height: 4px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 2px;
  overflow: hidden;
}

#unlock-tracker .unlock-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease-out;
  box-shadow: 0 0 6px currentColor;
}

/* Speed Controls */
#speed-controls {
  position: absolute;
  top: 36px;
  right: 16px;
  display: flex;
  gap: 4px;
  z-index: 10;
}

.speed-btn {
  background: rgba(20, 20, 20, 0.8);
  color: #888;
  border: 1px solid #333;
  padding: 4px 10px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.speed-btn:hover { color: #fff; border-color: #666; }
.speed-btn.active {
  color: #00ffff;
  border-color: #00ffff;
  box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
}

/* Tower Panel */
#tower-panel {
  width: 200px;
  background: #0d0d0d;
  border-left: 1px solid #1a1a2e;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
}

#tower-panel h3 {
  color: #00ffff;
  font-size: 14px;
  text-align: center;
  letter-spacing: 4px;
  text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
  margin-bottom: 4px;
}

.tower-btn {
  background: rgba(20, 20, 30, 0.8);
  border: 1px solid var(--tower-color, #333);
  padding: 8px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.tower-btn:hover {
  box-shadow: 0 0 12px var(--tower-color, #333);
  background: rgba(30, 30, 50, 0.8);
}

.tower-btn.selected {
  background: rgba(255, 255, 255, 0.1);
  border-width: 2px;
  box-shadow: 0 0 16px var(--tower-color, #333), 0 0 30px var(--tower-color, #333), inset 0 0 12px rgba(255,255,255,0.08);
}

.tower-btn .tower-name {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: var(--tower-color, #ccc);
  font-weight: bold;
}

.tower-btn .tower-cost {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: #ffd700;
}

.tower-btn .tower-desc {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: #666;
}

/* Unaffordable towers */
.tower-btn.tower-unaffordable {
  opacity: 0.35;
  cursor: default;
}

.tower-btn.tower-unaffordable:hover {
  box-shadow: none;
  background: rgba(20, 20, 30, 0.8);
}

/* Locked towers */
.tower-btn.tower-locked {
  opacity: 0.4;
  cursor: default;
  border-color: #222;
  background: rgba(10, 10, 15, 0.6);
}

.tower-btn.tower-locked:hover {
  box-shadow: none;
  background: rgba(10, 10, 15, 0.6);
}

.tower-btn .locked-name {
  color: #555 !important;
}

.tower-btn .tower-unlock-req {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: #ff8800;
  letter-spacing: 1px;
}

/* Unlock notification */
#unlock-notification {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: rgba(0, 10, 20, 0.95);
  border: 1px solid #00ff66;
  box-shadow: 0 0 30px rgba(0, 255, 100, 0.4), 0 0 60px rgba(0, 255, 100, 0.15);
  padding: 20px 36px;
  z-index: 90;
  text-align: center;
  font-family: 'Courier New', monospace;
  opacity: 0;
  transition: opacity 0.5s, transform 0.5s;
  pointer-events: none;
}

#unlock-notification.unlock-visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#unlock-notification .unlock-title {
  font-size: 18px;
  color: #00ff66;
  letter-spacing: 4px;
  text-shadow: 0 0 15px rgba(0, 255, 100, 0.6);
  margin-bottom: 8px;
}

#unlock-notification .unlock-names {
  font-size: 16px;
  font-weight: bold;
}

/* Upgrade Panel */
#upgrade-panel {
  position: absolute;
  background: rgba(10, 10, 15, 0.95);
  border: 1px solid #333;
  padding: 12px;
  z-index: 20;
  min-width: 300px;
  display: none;
  font-family: 'Courier New', monospace;
}

#upgrade-panel .up-title { font-weight: bold; margin-bottom: 4px; font-size: 13px; }
#upgrade-panel .up-stats {
  display: flex; gap: 10px; flex-wrap: wrap;
  font-size: 10px; color: #888; padding: 4px 0 6px;
  border-bottom: 1px solid #1a1a2e; margin-bottom: 4px;
}
#upgrade-panel .up-stats span { white-space: nowrap; }
#upgrade-panel .up-path-name { margin-top: 6px; color: #aaa; font-size: 11px; letter-spacing: 1px; }
#upgrade-panel .up-level {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 6px; margin: 2px 0; border: 1px solid transparent; border-radius: 2px;
}
#upgrade-panel .up-cost { font-size: 11px; font-weight: bold; min-width: 44px; }
#upgrade-panel .up-info { display: flex; flex-direction: column; gap: 1px; }
#upgrade-panel .up-desc { font-size: 10px; }
#upgrade-panel .up-changes { font-size: 9px; color: #335566; letter-spacing: 1px; }
#upgrade-panel .up-purchased .up-changes { color: rgba(0, 255, 100, 0.4); }
#upgrade-panel .up-available .up-changes { color: #66ccff; }
#upgrade-panel .up-unaffordable .up-changes { color: #3a3a3a; }
#upgrade-panel .up-locked .up-changes { color: #1a1a1a; }
#upgrade-panel .up-check { color: #00ff66; font-size: 12px; min-width: 44px; }
#upgrade-panel .up-purchased .up-desc { color: rgba(0, 255, 100, 0.7); }
#upgrade-panel .up-available {
  cursor: pointer; background: rgba(255, 215, 0, 0.12);
  border: 1px solid rgba(255, 215, 0, 0.5);
  box-shadow: 0 0 10px rgba(255, 215, 0, 0.3), 0 0 20px rgba(255, 215, 0, 0.1), inset 0 0 10px rgba(255, 215, 0, 0.08);
  animation: up-glow 2s ease-in-out infinite;
}
#upgrade-panel .up-available:hover {
  background: rgba(255, 215, 0, 0.22); border-color: rgba(255, 215, 0, 0.7);
  box-shadow: 0 0 16px rgba(255, 215, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.2), inset 0 0 14px rgba(255, 215, 0, 0.1);
  animation: none;
}
@keyframes up-glow {
  0%, 100% { box-shadow: 0 0 8px rgba(255, 215, 0, 0.2), 0 0 16px rgba(255, 215, 0, 0.08), inset 0 0 8px rgba(255, 215, 0, 0.05); }
  50% { box-shadow: 0 0 14px rgba(255, 215, 0, 0.4), 0 0 28px rgba(255, 215, 0, 0.15), inset 0 0 12px rgba(255, 215, 0, 0.1); }
}
#upgrade-panel .up-available .up-cost { color: #ffd700; }
#upgrade-panel .up-available .up-desc { color: #fff; }
#upgrade-panel .up-unaffordable {
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.02);
}
#upgrade-panel .up-unaffordable .up-cost { color: #663333; }
#upgrade-panel .up-unaffordable .up-desc { color: #888; }
#upgrade-panel .up-unaffordable .up-changes { color: #556677; }
#upgrade-panel .up-locked .up-cost { color: #2a2a2a; }
#upgrade-panel .up-locked .up-desc { color: #2a2a2a; }
#upgrade-panel .up-actions { margin-top: 8px; display: flex; gap: 12px; }
#upgrade-panel .move-btn { font-size: 10px; color: #00aaff; cursor: pointer; }
#upgrade-panel .sell-btn { font-size: 10px; color: #ff6666; cursor: pointer; }

/* Wave Preview */
#wave-preview {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 6px 16px;
  font-size: 12px;
  color: #888;
  border: 1px solid #222;
  z-index: 10;
  display: none;
}

/* Start Wave Button */
#start-wave-btn {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 255, 255, 0.1);
  color: #00ffff;
  border: 1px solid #00ffff;
  padding: 10px 30px;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  cursor: pointer;
  z-index: 10;
  display: none;
  transition: all 0.2s;
  text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
}

#start-wave-btn:hover {
  background: rgba(0, 255, 255, 0.2);
  box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
}

/* Menu Screen */
#menu-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.92);
  z-index: 100;
}

#menu-screen h1 {
  font-size: 48px;
  color: #00ffff;
  letter-spacing: 12px;
  text-shadow: 0 0 30px rgba(0, 255, 255, 0.6), 0 0 60px rgba(0, 255, 255, 0.3);
  margin-bottom: 40px;
}

.menu-btn {
  background: transparent;
  color: #00ffff;
  border: 1px solid #00ffff;
  padding: 12px 40px;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  cursor: pointer;
  margin: 8px;
  letter-spacing: 2px;
  transition: all 0.3s;
}

.menu-btn:hover {
  background: rgba(0, 255, 255, 0.15);
  box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
}

#lang-select {
  position: absolute;
  top: 16px;
  right: 20px;
  display: flex;
  gap: 4px;
}

.lang-btn {
  background: transparent;
  color: #555;
  border: 1px solid #333;
  padding: 4px 10px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.lang-btn:hover { color: #aaa; border-color: #666; }
.lang-btn.active {
  color: #00ffff;
  border-color: #00ffff;
}

#difficulty-label {
  color: #666;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  letter-spacing: 3px;
  margin-bottom: 8px;
}

#difficulty-buttons {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}

.difficulty-btn {
  padding: 12px 24px;
  font-size: 14px;
}

.difficulty-btn[data-difficulty="hard"] {
  color: #ff4444;
  border-color: #ff4444;
}
.difficulty-btn[data-difficulty="hard"]:hover {
  background: rgba(255, 68, 68, 0.15);
  box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
}

.difficulty-btn[data-difficulty="normal"] {
  color: #ffaa00;
  border-color: #ffaa00;
}
.difficulty-btn[data-difficulty="normal"]:hover {
  background: rgba(255, 170, 0, 0.15);
  box-shadow: 0 0 20px rgba(255, 170, 0, 0.4);
}

.difficulty-btn[data-difficulty="easy"] {
  color: #00ff66;
  border-color: #00ff66;
}
.difficulty-btn[data-difficulty="easy"]:hover {
  background: rgba(0, 255, 100, 0.15);
  box-shadow: 0 0 20px rgba(0, 255, 100, 0.4);
}

/* Pause Overlay */
#pause-overlay {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.7);
  z-index: 50;
}

#pause-overlay h2 {
  color: #00ffff;
  font-size: 36px;
  letter-spacing: 8px;
  text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
}

#pause-overlay p {
  color: #666;
  margin-top: 16px;
  font-size: 14px;
}

/* Game Over */
#game-over-screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.9);
  z-index: 100;
  gap: 12px;
}

#game-over-screen h2 {
  color: #ff4444;
  font-size: 36px;
  letter-spacing: 6px;
  text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
}

#game-over-screen p { color: #aaa; font-size: 14px; }

#player-name {
  background: #111;
  border: 1px solid #333;
  color: #fff;
  padding: 8px 16px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  text-align: center;
  outline: none;
}

#player-name:focus { border-color: #00ffff; }

.menu-btn:disabled {
  opacity: 0.3;
  cursor: default;
  pointer-events: none;
}

#high-scores-list {
  display: none;
  margin-top: 20px;
  text-align: left;
  font-size: 13px;
  color: #aaa;
}

#high-scores-list .score-entry {
  padding: 4px 0;
  border-bottom: 1px solid #1a1a1a;
}

@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.hidden { display: none !important; }

/* Tutorial overlay */
#tutorial-overlay {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 10, 20, 0.92);
  border: 1px solid #00ffff;
  box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 30px rgba(0, 255, 255, 0.05);
  padding: 16px 24px;
  max-width: 420px;
  width: 90%;
  z-index: 60;
  text-align: center;
  font-size: 14px;
  line-height: 1.6;
  color: #ddd;
}

#tutorial-overlay .tutorial-msg {
  margin-bottom: 12px;
}

#tutorial-overlay .tutorial-btn {
  background: rgba(0, 255, 255, 0.1);
  color: #00ffff;
  border: 1px solid #00ffff;
  padding: 8px 24px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

#tutorial-overlay .tutorial-btn:hover {
  background: rgba(0, 255, 255, 0.2);
  box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
}

@keyframes tutorial-pulse {
  0%, 100% { box-shadow: 0 0 8px rgba(0, 255, 255, 0.3); }
  50% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.7), 0 0 40px rgba(0, 255, 255, 0.3); }
}

.tutorial-highlight {
  animation: tutorial-pulse 1.2s ease-in-out infinite !important;
  border-color: #00ffff !important;
}

@media (max-width: 768px) {
  #tutorial-overlay {
    bottom: auto;
    top: 40px;
    font-size: 15px;
    padding: 12px 16px;
  }
}

@media (pointer: coarse) {
  #tutorial-overlay .tutorial-btn {
    min-height: 44px;
    padding: 10px 28px;
  }
}

/* Cancel placement button */
#cancel-place-btn {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(255, 68, 68, 0.15);
  color: #ff4444;
  border: 1px solid #ff4444;
  padding: 10px 20px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  cursor: pointer;
  z-index: 15;
}

/* ==========================================
   MOBILE RESPONSIVE
   ========================================== */

/* Portrait phones */
@media (max-width: 768px) {
  #game-container {
    flex-direction: column;
  }

  #canvas-wrapper {
    min-height: 0;
  }

  #ui-overlay {
    font-size: 14px;
    padding: 6px 10px;
  }

  #unlock-tracker {
    top: 30px;
    left: 8px;
    font-size: 12px;
  }

  #unlock-tracker .unlock-bar-bg {
    width: 90px;
  }

  #speed-controls {
    top: 28px;
    right: 8px;
  }

  .speed-btn {
    padding: 10px 14px;
    font-size: 14px;
    min-width: 44px;
    min-height: 44px;
  }

  #tower-panel {
    width: 100%;
    max-height: 35vh;
    border-left: none;
    border-top: 1px solid #1a1a2e;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: flex-start;
    padding: 8px;
    gap: 6px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #tower-panel h3 {
    width: 100%;
    font-size: 14px;
    margin-bottom: 2px;
  }

  .tower-btn {
    flex: 1 1 calc(50% - 6px);
    min-width: 130px;
    min-height: 64px;
    padding: 10px;
    gap: 5px;
  }

  .tower-btn .tower-name { font-size: 15px; }
  .tower-btn .tower-cost { font-size: 14px; }
  .tower-btn .tower-unlock-req { font-size: 13px; }
  .tower-btn .tower-desc { display: none; }

  #upgrade-panel {
    min-width: unset;
    width: 90%;
    left: 5% !important;
    bottom: 8px;
    top: auto !important;
    max-height: 40vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
  }

  #upgrade-panel .up-title { font-size: 18px; margin-bottom: 6px; }
  #upgrade-panel .up-stats { font-size: 13px; gap: 12px; }
  #upgrade-panel .up-path-name { font-size: 15px; margin-top: 10px; }
  #upgrade-panel .up-level { padding: 8px 6px; }
  #upgrade-panel .up-cost { font-size: 15px; min-width: 56px; }
  #upgrade-panel .up-desc { font-size: 14px; }
  #upgrade-panel .up-changes { font-size: 12px; }
  #upgrade-panel .up-check { font-size: 15px; min-width: 56px; }
  #upgrade-panel .up-actions { margin-top: 12px; gap: 20px; }
  #upgrade-panel .move-btn { font-size: 15px; padding: 8px 0; }
  #upgrade-panel .sell-btn { font-size: 15px; padding: 8px 0; }

  #start-wave-btn {
    padding: 14px 36px;
    font-size: 18px;
    bottom: 60px;
  }

  #wave-preview {
    bottom: 6px;
    font-size: 13px;
    padding: 4px 10px;
  }

  #menu-screen h1 {
    font-size: 28px;
    letter-spacing: 6px;
  }

  #difficulty-buttons {
    flex-direction: column;
    gap: 8px;
  }

  .menu-btn {
    padding: 14px 36px;
    font-size: 16px;
    min-height: 48px;
  }

  #game-over-screen h2 { font-size: 28px; }
  #pause-overlay h2 { font-size: 28px; }

  #lang-select { gap: 8px; }
  .lang-btn {
    font-size: 16px;
    padding: 10px 18px;
    min-width: 48px;
    min-height: 48px;
  }
}

/* Landscape phones */
@media (max-height: 500px) {
  #game-container {
    flex-direction: row;
  }

  #tower-panel {
    width: 160px;
    max-height: 100vh;
    border-top: none;
    border-left: 1px solid #1a1a2e;
    flex-direction: column;
    flex-wrap: nowrap;
  }

  .tower-btn {
    flex: unset;
    min-width: unset;
    min-height: 44px;
  }

  .tower-btn .tower-desc { display: none; }

  #ui-overlay {
    font-size: 11px;
    padding: 4px 8px;
  }
}

/* Touch devices: larger tap targets */
@media (pointer: coarse) {
  .speed-btn {
    min-width: 44px;
    min-height: 44px;
    padding: 10px 12px;
  }

  .tower-btn { min-height: 48px; }
  .menu-btn { min-height: 48px; padding: 12px 32px; }
  #start-wave-btn { min-height: 48px; }
  #cancel-place-btn { min-height: 44px; }
  #pause-overlay p { display: none; }
}
</style>
</head>
<body>

<div id="game-container">
  <div id="canvas-wrapper">
    <canvas id="game-canvas"></canvas>

    <div id="ui-overlay">
      <div id="hud-gold" class="hud-item">$ <span id="gold-value">100</span></div>
      <div id="hud-wave" class="hud-item">WAVE <span id="wave-value">0</span></div>
      <div id="hud-lives" class="hud-item">&hearts; <span id="lives-value">20</span></div>
      <div id="hud-score" class="hud-item">SCORE <span id="score-value">0</span></div>
    </div>

    <div id="unlock-tracker" class="hidden"></div>

    <div id="speed-controls">
      <button class="speed-btn active" data-speed="1">1x</button>
      <button class="speed-btn" data-speed="2">2x</button>
      <button class="speed-btn" data-speed="3">3x</button>
      <button class="speed-btn" id="pause-btn">| |</button>
      <button class="speed-btn" id="mute-btn" title="Toggle music">&#9835;</button>
    </div>

    <div id="wave-preview">Next: <span id="wave-preview-content"></span></div>
    <button id="start-wave-btn">START WAVE</button>
    <button id="cancel-place-btn" class="hidden">CANCEL</button>
    <div id="tutorial-overlay" class="hidden"></div>
    <div id="upgrade-panel"></div>

    <div id="menu-screen">
      <div id="lang-select">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="it">IT</button>
      </div>
      <h1>NEON DEFENSE</h1>
      <div id="difficulty-label">SELECT DIFFICULTY</div>
      <div id="difficulty-buttons">
        <button class="menu-btn difficulty-btn" data-difficulty="hard">SHORT PATH</button>
        <button class="menu-btn difficulty-btn" data-difficulty="normal">MEDIUM PATH</button>
        <button class="menu-btn difficulty-btn" data-difficulty="easy">LONG PATH</button>
      </div>
      <button class="menu-btn" id="high-scores-btn">GLOBAL SCORES</button>
      <div id="high-scores-list"></div>
    </div>

    <div id="pause-overlay">
      <h2>PAUSED</h2>
      <p>Press SPACE or ESC to resume</p>
      <button class="menu-btn" id="resume-btn" style="margin-top: 16px;">RESUME</button>
    </div>

    <div id="game-over-screen">
      <h2>GAME OVER</h2>
      <p>Score: <span id="final-score">0</span></p>
      <p>Wave: <span id="final-wave">0</span></p>
      <p id="next-unlock-hint" style="display:none; font-size: 13px; color: #aaa;"></p>
      <input id="player-name" placeholder="Enter name" maxlength="12">
      <button class="menu-btn" id="save-score-btn">SAVE SCORE</button>
      <button class="menu-btn" id="play-again-btn">PLAY AGAIN</button>
    </div>
  </div>

  <div id="tower-panel" class="hidden">
    <h3>TOWERS</h3>
    <div id="tower-list"></div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
